<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>aigrep flow diagram</title>
  <desc>A tree flowchart showing how aigrep works including flag branches for --browser, --output, and --save</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Step 1: User command ── -->
  <rect x="215" y="20" width="250" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="340" y="42" text-anchor="middle" dominant-baseline="central">User runs aigrep scrape</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="340" y="60" text-anchor="middle" dominant-baseline="central">&lt;url&gt; "&lt;prompt&gt;" [flags]</text>

  <line x1="340" y1="76" x2="340" y2="110" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 2: Config check ── -->
  <rect x="215" y="110" width="250" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#444441" x="340" y="132" text-anchor="middle" dominant-baseline="central">Config check</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="150" text-anchor="middle" dominant-baseline="central">Read keychain → provider + key</text>

  <!-- No config branch -->
  <line x1="465" y1="138" x2="540" y2="138" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <rect x="540" y="110" width="120" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13" x="600" y="132" text-anchor="middle" dominant-baseline="central">No config</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="600" y="150" text-anchor="middle" dominant-baseline="central">Run aigrep config</text>

  <line x1="340" y1="166" x2="340" y2="206" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 3: --browser decision ── -->
  <rect x="215" y="206" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#444441" x="340" y="228" text-anchor="middle" dominant-baseline="central">--browser flag?</text>

  <!-- No branch: axios -->
  <line x1="270" y1="250" x2="160" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="188" y="276" text-anchor="middle">no</text>
  <rect x="60" y="290" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="160" y="312" text-anchor="middle" dominant-baseline="central">axios fetch</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="160" y="330" text-anchor="middle" dominant-baseline="central">Fast, static pages</text>

  <!-- Yes branch: Playwright -->
  <line x1="410" y1="250" x2="510" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="488" y="276" text-anchor="middle">--browser</text>
  <rect x="410" y="290" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="510" y="312" text-anchor="middle" dominant-baseline="central">Playwright fetch</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="510" y="330" text-anchor="middle" dominant-baseline="central">JS-rendered pages</text>

  <!-- Auth wall branches -->
  <line x1="160" y1="346" x2="160" y2="380" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <line x1="510" y1="346" x2="510" y2="380" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <rect x="60" y="380" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13" x="160" y="396" text-anchor="middle" dominant-baseline="central">Auth wall detected</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="160" y="412" text-anchor="middle" dominant-baseline="central">Block + show error</text>
  <rect x="410" y="380" width="200" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13" x="510" y="396" text-anchor="middle" dominant-baseline="central">Auth wall detected</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="510" y="412" text-anchor="middle" dominant-baseline="central">Block + show error</text>

  <!-- Merge back to parse -->
  <path d="M160 346 L160 460 L280 460" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M510 346 L510 460 L400 460" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 4: Parse ── -->
  <rect x="215" y="436" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="458" text-anchor="middle" dominant-baseline="central">Parse HTML</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="476" text-anchor="middle" dominant-baseline="central">Strip noise, extract clean text</text>

  <line x1="340" y1="492" x2="340" y2="532" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 5: AI ── -->
  <rect x="215" y="532" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#633806" x="340" y="554" text-anchor="middle" dominant-baseline="central">AI extraction</text>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" x="340" y="572" text-anchor="middle" dominant-baseline="central">Anthropic / OpenAI / Gemini / Groq</text>

  <line x1="340" y1="588" x2="340" y2="628" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 6: --output decision ── -->
  <rect x="215" y="628" width="250" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#444441" x="340" y="650" text-anchor="middle" dominant-baseline="central">--output flag?</text>

  <!-- Table branch -->
  <line x1="270" y1="672" x2="160" y2="712" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="182" y="698" text-anchor="middle">table</text>
  <rect x="60" y="712" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="160" y="728" text-anchor="middle" dominant-baseline="central">Render table</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="160" y="746" text-anchor="middle" dominant-baseline="central">cli-table3 in terminal</text>

  <!-- JSON branch -->
  <line x1="410" y1="672" x2="510" y2="712" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="488" y="698" text-anchor="middle">--output json</text>
  <rect x="410" y="712" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="510" y="728" text-anchor="middle" dominant-baseline="central">Render JSON</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="510" y="746" text-anchor="middle" dominant-baseline="central">Formatted + coloured</text>

  <!-- --save branches -->
  <line x1="160" y1="756" x2="160" y2="796" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="510" y1="756" x2="510" y2="796" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="96" y="780" text-anchor="middle">--save</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="572" y="780" text-anchor="middle">--save</text>
  <rect x="60" y="796" width="200" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="160" y="812" text-anchor="middle" dominant-baseline="central">Save to file</text>
  <text font-family="sans-serif" font-size="12" fill="#3B6D11" x="160" y="830" text-anchor="middle" dominant-baseline="central">results.json on disk</text>
  <rect x="410" y="796" width="200" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A" x="510" y="812" text-anchor="middle" dominant-baseline="central">Save to file</text>
  <text font-family="sans-serif" font-size="12" fill="#3B6D11" x="510" y="830" text-anchor="middle" dominant-baseline="central">results.json on disk</text>

  <!-- Legend -->
  <line x1="30" y1="30" x2="60" y2="30" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="65" y="34">normal flow</text>
  <line x1="30" y1="52" x2="60" y2="52" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="65" y="56">error / optional</text>
</svg>
